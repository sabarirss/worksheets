    <script src="icons.js" defer></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>

    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>

    <!-- Firebase Auth & Storage -->
    <script src="firebase-auth.js" defer></script>
    <script src="firebase-storage.js" defer></script>
    <script src="completion-manager.js" defer></script>
    <script src="age-filter.js" defer></script>
    <script src="admin-level-manager.js" defer></script>
    <script src="child-session-manager.js" defer></script>
    <script src="profile-selector.js" defer></script>
    <script src="theme-manager.js" defer></script>

    <!-- TensorFlow.js for handwriting recognition -->
    <!-- TF.js lazy-loaded by handwriting-recognition.js when needed -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js" defer></script>
    <style>
        /* Hide content initially to prevent flash of inappropriate content */
        .container {
            opacity: 0;
            transition: opacity 0.1s ease-in;
        }

        /* Show content after auth and profile check completes */
        .container.content-loaded {
            opacity: 1;
        }
    </style>
</head>
<body>
    <script>
        // Wait for Firebase auth to initialize
        firebase.auth().onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = 'login';
                return;
            }

            // Check if user is admin
            const userDoc = await firebase.firestore().collection('users')
                .where('email', '==', user.email.toLowerCase())
                .limit(1)
                .get();

            let isAdmin = false;
            if (!userDoc.empty) {
                const userData = userDoc.docs[0].data();
                isAdmin = userData.role === 'admin';
                // BUG-054: Set window.currentUserRole so generators can check admin status
                window.currentUserRole = userData.role;
            }

            let childAge;
            if (isAdmin) {
                // Admin: use selected child's age if available, else default 10+
                const adminChild = getSelectedChild();
                childAge = (adminChild && adminChild.age) ? adminChild.age.toString() : '10';
                console.log('Admin user - using age:', childAge);
            } else {
                // Auto-detect child's age from selected profile (DOB-based)
                const child = getSelectedChild();
                if (!child || !child.age) {
                    alert('Please select a child profile first');
                    window.location.href = 'children-profiles';
                    return;
                }
                // For Aptitude: Always use actual age from DOB (no assessment)
                childAge = child.age.toString();
                console.log('Aptitude: Using actual age from DOB:', childAge);
            }

            // Set current age automatically (defined in aptitude-generator.js)
            // Using setTimeout to ensure the generator script is loaded
            setTimeout(function() {
                if (typeof currentAge !== 'undefined') {
                    currentAge = childAge;
                }
                // Age-based filtering removed - all children can access all difficulty levels

                // Show content now that auth and profile check is complete
                document.querySelector('.container').classList.add('content-loaded');
            }, 200);
        });
    </script>
    <div class="container">
        <div class="user-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div id="app-branding"></div>
                <div>
                    <h1>🧩 Aptitude & Logic Puzzles</h1>
                    <p class="subtitle">Fun brain exercises with difficulty levels!</p>
                </div>
            </div>
            <div class="user-actions">
                <div id="profile-selector-container"></div>
            </div>
        </div>

        <!-- Challenge Type Selection (Age is auto-detected from profile) -->
        <div class="level-selection" id="type-selection">
            <div class="back-row">
                <button class="back-btn-icon" onclick="backToAges()" title="Back to Home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></button>
            </div>
            <h2>Challenges</h2>
            <div class="level-grid">
                <button onclick="selectType('patterns')" class="level-btn">
                    <span class="level-name">🔷 Patterns</span>
                    <span class="level-desc">Complete sequences</span>
                </button>
                <button onclick="selectType('counting')" class="level-btn">
                    <span class="level-name">🔢 Counting</span>
                    <span class="level-desc">Count objects</span>
                </button>
                <button onclick="selectType('sequences')" class="level-btn">
                    <span class="level-name">➡️ Sequences</span>
                    <span class="level-desc">What comes next?</span>
                </button>
                <button onclick="selectType('matching')" class="level-btn">
                    <span class="level-name">🔗 Matching</span>
                    <span class="level-desc">Find pairs</span>
                </button>
                <button onclick="selectType('oddone')" class="level-btn">
                    <span class="level-name">👀 Odd One Out</span>
                    <span class="level-desc">Find the different</span>
                </button>
                <button onclick="selectType('comparison')" class="level-btn">
                    <span class="level-name">📏 Compare</span>
                    <span class="level-desc">Bigger or smaller?</span>
                </button>
                <button onclick="selectType('logic')" class="level-btn">
                    <span class="level-name">🤔 Logic</span>
                    <span class="level-desc">Think and solve!</span>
                </button>
            </div>
        </div>


        <!-- Worksheet Content Container -->
        <div id="worksheet-content" style="display: none;"></div>

        <footer>
            <p>Have fun learning! 🎉</p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
    <script src="handwriting-input.js" defer></script>
    <script src="handwriting-recognition.js" defer></script>
    <script src="aptitude-handwriting-enhanced.js" defer></script>
    <script src="level-mapper.js" defer></script>
    <script src="age-content-mapper.js" defer></script>
    <script src="aptitude-age-content.js" defer></script>
    <script src="app-constants.js" defer></script>
    <script src="aptitude-generator.js" defer></script>
    <script src="branding.js" defer></script>
    <script>
        // Add completion badges on page load
        document.addEventListener('DOMContentLoaded', async function() {
            // Get all completed aptitude worksheets
            const completedWorksheets = await getCompletedWorksheets('aptitude');
            if (!completedWorksheets || !Array.isArray(completedWorksheets)) return;

            // Track which types have at least one completed difficulty
            const completedTypes = new Set();

            completedWorksheets.forEach(identifier => {
                // identifier format: "type-difficulty" (e.g., "mazes-easy")
                const parts = identifier.split('-');
                if (parts.length === 2) {
                    const type = parts[0];
                    completedTypes.add(type);
                }
            });

            // Add badges to type selection buttons if any difficulty is completed
            completedTypes.forEach(type => {
                const buttons = document.querySelectorAll(`button[onclick*="selectType('${type}')"]`);
                buttons.forEach(btn => {
                    btn.classList.add('completed');
                });
            });
        });

        // Override selectType to show completion on difficulty buttons
        const originalSelectType = selectType;
        selectType = function(type) {
            originalSelectType(type);

            // After showing difficulty selection, add badges to completed difficulties
            setTimeout(async () => {
                const completedWorksheets = await getCompletedWorksheets('aptitude');
                if (!completedWorksheets || !Array.isArray(completedWorksheets)) return;
                ['easy', 'medium', 'hard'].forEach(difficulty => {
                    const identifier = `${type}-${difficulty}`;
                    if (completedWorksheets.includes(identifier)) {
                        const buttons = document.querySelectorAll(`button[onclick*="loadPuzzles('${difficulty}')"]`);
                        buttons.forEach(btn => {
                            btn.classList.add('completed');
                        });
                    }
                });
            }, 100);
        };
    </script>
