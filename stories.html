<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Time - GleeGrow</title>
    <link rel="icon" type="image/png" href="gleegrow.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="feedback.css">
    <script src="strings.js" defer></script>
    <script src="icons.js" defer></script>
    <script src="feedback.js" defer></script>
    <script src="sound-manager.js" defer></script>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="stories.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>

    <!-- Firebase Auth -->
    <script src="firebase-auth.js" defer></script>
    <script src="age-filter.js" defer></script>
    <script src="admin-level-manager.js" defer></script>
    <script src="child-session-manager.js" defer></script>
    <script src="profile-selector.js" defer></script>
    <script src="theme-manager.js" defer></script>
    <style>
        /* Hide content initially to prevent flash of inappropriate content */
        .container {
            opacity: 0;
            transition: opacity 0.1s ease-in;
        }

        /* Show content after auth and profile check completes */
        .container.content-loaded {
            opacity: 1;
        }
    </style>
</head>
<body>
    <script>
        // Wait for Firebase auth to initialize
        firebase.auth().onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = 'login';
                return;
            }

            // Check if user is admin
            const userDoc = await firebase.firestore().collection('users')
                .where('email', '==', user.email.toLowerCase())
                .limit(1)
                .get();

            let isAdmin = false;
            if (!userDoc.empty) {
                const userData = userDoc.docs[0].data();
                isAdmin = userData.role === 'admin';
                // BUG-054: Set window.currentUserRole so generators can check admin status
                window.currentUserRole = userData.role;
            }

            let childAge;
            if (isAdmin) {
                // Admin: use selected child's age if available, else default 10+
                const adminChild = getSelectedChild();
                childAge = (adminChild && adminChild.age) ? adminChild.age.toString() : '10';
                console.log('Admin user - using age:', childAge);
            } else {
                // Auto-detect child's age from selected profile
                const child = getSelectedChild();
                if (!child || !child.age) {
                    alert('Please select a child profile first');
                    window.location.href = 'children-profiles';
                    return;
                }
                // For Stories: Always use actual age from DOB (no assessment)
                childAge = child.age.toString();
                console.log('Stories: Using actual age from DOB:', childAge);
            }

            // Set current age automatically (defined in stories-generator.js)
            setTimeout(function() {
                if (typeof currentAge !== 'undefined') {
                    currentAge = childAge;
                }
                // Age-based filtering removed - all children can access all difficulty levels

                // Show content now that auth and profile check is complete
                document.querySelector('.container').classList.add('content-loaded');
            }, 200);
        });
    </script>
    <div class="container">
        <div class="user-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div id="app-branding"></div>
                <div>
                    <h1>📖 Story Time</h1>
                    <p class="subtitle">Hand-Written Quality Stories with Real Photos!</p>
                </div>
            </div>
            <div class="user-actions">
                <div id="profile-selector-container"></div>
            </div>
        </div>

        <!-- Story Category Selection (Age is auto-detected from profile) -->
        <div class="story-selection" id="category-selection">
            <div class="back-row">
                <button class="back-btn-icon" onclick="backToAges()" title="Back to Home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></button>
            </div>
            <h2>Story Categories</h2>
            <div class="category-grid">
                <button onclick="selectCategory('animals')" class="category-btn">
                    <span class="category-icon">🦁</span>
                    <span class="category-name">Animal Stories</span>
                    <span class="story-count">90+ unique stories</span>
                </button>
                <button onclick="selectCategory('nature')" class="category-btn">
                    <span class="category-icon">🌳</span>
                    <span class="category-name">Nature Tales</span>
                    <span class="story-count">90+ unique stories</span>
                </button>
                <button onclick="selectCategory('family')" class="category-btn">
                    <span class="category-icon">👨‍👩‍👧‍👦</span>
                    <span class="category-name">Family & Friends</span>
                    <span class="story-count">90+ unique stories</span>
                </button>
                <button onclick="selectCategory('adventures')" class="category-btn">
                    <span class="category-icon">🚀</span>
                    <span class="category-name">Adventures</span>
                    <span class="story-count">75+ unique stories</span>
                </button>
                <button onclick="selectCategory('learning')" class="category-btn">
                    <span class="category-icon">📚</span>
                    <span class="category-name">Learning & School</span>
                    <span class="story-count">90+ unique stories</span>
                </button>
                <button onclick="selectCategory('bedtime')" class="category-btn">
                    <span class="category-icon">🌙</span>
                    <span class="category-name">Bedtime Stories</span>
                    <span class="story-count">44+ unique stories</span>
                </button>
            </div>
        </div>


        <div class="story-list" id="story-list" style="display: none;">
            <div class="back-row">
                <button class="back-btn-icon" onclick="backToCategories()" title="Back to Categories"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></button>
            </div>
            <h2 id="category-title">Stories</h2>
            <div id="stories-container"></div>
        </div>

        <div class="story-reader" id="story-reader" style="display: none;">
            <div class="story-content" id="story-content"></div>
            <div class="story-navigation">
                <button onclick="previousStory()" id="prev-btn">← Previous Story</button>
                <button onclick="nextStory()" id="next-btn">Next Story →</button>
            </div>
        </div>

        <footer>
            <p>Happy Reading! 📚✨</p>
        </footer>
    </div>

    <script src="level-mapper.js" defer></script>
    <script src="age-content-mapper.js" defer></script>
    <script src="stories-age-content.js" defer></script>
    <script src="unique-stories-database.js" defer></script>
    <script src="stories-db-animals.js" defer></script>
    <script src="stories-db-nature.js" defer></script>
    <script src="stories-db-family.js" defer></script>
    <script src="stories-db-adventures.js" defer></script>
    <script src="stories-db-learning.js" defer></script>
    <script src="stories-db-bedtime.js" defer></script>
    <script src="app-constants.js" defer></script>
    <script src="tts-manager.js" defer></script>
    <script src="stories-generator.js" defer></script>
    <script src="branding.js" defer></script>
    <nav class="bottom-nav" aria-label="Main navigation">
        <div class="bottom-nav-inner">
            <a href="index" class="bottom-nav-item"><span class="nav-icon" data-icon="home" data-icon-size="22" data-icon-color="currentColor"></span>Home</a>
            <a href="stories" class="bottom-nav-item"><span class="nav-icon" data-icon="book" data-icon-size="22" data-icon-color="currentColor"></span>Stories</a>
            <a href="rewards" class="bottom-nav-item"><span class="nav-icon" data-icon="star" data-icon-size="22" data-icon-color="currentColor"></span>Rewards</a>
            <a href="settings" class="bottom-nav-item"><span class="nav-icon" data-icon="settings" data-icon-size="22" data-icon-color="currentColor"></span>Settings</a>
        </div>
    </nav>
    <script>if (typeof GleeIcons !== 'undefined') GleeIcons.init();</script>
</body>
</html>
