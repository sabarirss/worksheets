<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotional Quotient - GleeGrow</title>
    <link rel="icon" type="image/png" href="gleegrow.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="feedback.css">
    <script src="strings.js" defer></script>
    <script src="icons.js" defer></script>
    <script src="feedback.js" defer></script>
    <script src="sound-manager.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>

    <!-- Firebase Auth -->
    <script src="firebase-auth.js" defer></script>
    <script src="age-filter.js" defer></script>
    <script src="admin-level-manager.js" defer></script>
    <script src="child-session-manager.js" defer></script>
    <script src="profile-selector.js" defer></script>
    <script src="theme-manager.js" defer></script>

    <style>
        .eq-selection {
            margin: 40px 0;
        }

        .difficulty-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin: 30px 0;
        }

        .difficulty-btn {
            background: var(--color-primary-gradient);
            border: none;
            padding: 40px 20px;
            cursor: pointer;
            border-radius: 15px;
            color: white;
            font-size: 1.3em;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .difficulty-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .eq-problem {
            background: white;
            border: 3px solid #000;
            padding: 30px;
            margin: 25px 0;
            border-radius: 15px;
        }

        .scenario-text {
            font-size: 1.2em;
            line-height: 1.8;
            padding: 20px;
            background: #f8f9fa;
            border-left: 5px solid var(--color-primary);
            border-radius: 8px;
            margin: 15px 0;
        }

        .emotion-face {
            font-size: 4em;
            margin: 20px;
            display: inline-block;
        }

        .emotion-options {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        .emotion-btn {
            padding: 15px 25px;
            font-size: 1.1em;
            border: 3px solid var(--color-primary);
            background: white;
            color: #333;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
            min-width: 150px;
        }

        .emotion-btn:hover {
            background: #ffd93d;
            border-color: #ffd93d;
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255, 217, 61, 0.4);
        }

        .emotion-btn.selected {
            background: var(--color-success);
            border-color: var(--color-success);
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }

        .emotion-btn.selected:hover {
            background: var(--color-success-dark);
            border-color: var(--color-success-dark);
        }

        .question-text {
            font-size: 1.3em;
            font-weight: bold;
            color: #2c3e50;
            margin: 15px 0;
        }

        .situation-image {
            font-size: 3em;
            text-align: center;
            margin: 20px 0;
        }

        .emoji-large {
            font-size: 5em;
            display: block;
            text-align: center;
            margin: 20px 0;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 480px) {
            .difficulty-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .difficulty-btn {
                padding: 20px 15px;
                font-size: 0.95em;
            }

            .emoji-large {
                font-size: 3em;
            }

            .situation-image {
                font-size: 2em;
            }

            .question-text {
                font-size: 1.1em;
            }

            .emotion-options {
                gap: 10px;
            }

            .emotion-btn {
                padding: 12px;
                font-size: 0.95em;
                min-width: 120px;
            }
        }

        @media (min-width: 481px) and (max-width: 768px) {
            .difficulty-grid {
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            }

            .difficulty-btn {
                padding: 30px 18px;
            }

            .emoji-large {
                font-size: 4em;
            }

            .situation-image {
                font-size: 2.5em;
            }

            .emotion-btn {
                min-width: 140px;
            }
        }

        /* Hide content initially to prevent flash of inappropriate content */
        .container {
            opacity: 0;
            transition: opacity 0.1s ease-in;
        }

        /* Show content after auth and profile check completes */
        .container.content-loaded {
            opacity: 1;
        }
    </style>
</head>
<body>
    <script>
        // Wait for Firebase auth to initialize
        firebase.auth().onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = 'login';
                return;
            }

            // Check if user is admin
            const userDoc = await firebase.firestore().collection('users')
                .where('email', '==', user.email.toLowerCase())
                .limit(1)
                .get();

            let isAdmin = false;
            if (!userDoc.empty) {
                const userData = userDoc.docs[0].data();
                isAdmin = userData.role === 'admin';
                // BUG-054: Set window.currentUserRole so generators can check admin status
                window.currentUserRole = userData.role;
            }

            let childAge;
            if (isAdmin) {
                // Admin: use selected child's age if available, else default 10+
                const adminChild = getSelectedChild();
                childAge = (adminChild && adminChild.age) ? adminChild.age.toString() : '10';
                console.log('Admin user - using age:', childAge);
            } else {
                // Auto-detect child's age from selected profile
                const child = getSelectedChild();
                if (!child || !child.age) {
                    alert('Please select a child profile first');
                    window.location.href = 'children-profiles';
                    return;
                }
                childAge = child.age.toString();
                console.log('EQ: Using actual age from DOB:', childAge);
            }

            // Set current age and load activities
            if (typeof currentAge !== 'undefined') {
                currentAge = childAge;
            }

            // Show content now that auth and profile check is complete
            document.querySelector('.container').classList.add('content-loaded');

            // Load activities now that age is set
            if (typeof loadActivities === 'function') {
                loadActivities('easy', 1);
            }
        });
    </script>
    <div class="container">
        <div class="user-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div id="app-branding"></div>
                <div>
                    <h1>❤️ Emotional Quotient Activities</h1>
                    <p class="subtitle">Building emotional intelligence and empathy!</p>
                </div>
            </div>
            <div class="user-actions">
                <div id="profile-selector-container"></div>
            </div>
        </div>


        <div id="worksheet-area"></div>

        <footer>
            <p>Understanding emotions makes us stronger! ❤️✨</p>
        </footer>
    </div>

    <script src="age-content-mapper.js" defer></script>
    <script src="level-mapper.js" defer></script>
    <script src="eq-age-content.js" defer></script>
    <script src="app-constants.js" defer></script>
    <script src="eq-generator.js" defer></script>
    <script src="branding.js" defer></script>
    <!-- Activities loaded from onAuthStateChanged callback after age is set -->
    <nav class="bottom-nav" aria-label="Main navigation">
        <div class="bottom-nav-inner">
            <a href="index" class="bottom-nav-item"><span class="nav-icon" data-icon="home" data-icon-size="22" data-icon-color="currentColor"></span>Home</a>
            <a href="stories" class="bottom-nav-item"><span class="nav-icon" data-icon="book" data-icon-size="22" data-icon-color="currentColor"></span>Stories</a>
            <a href="rewards" class="bottom-nav-item"><span class="nav-icon" data-icon="star" data-icon-size="22" data-icon-color="currentColor"></span>Rewards</a>
            <a href="settings" class="bottom-nav-item"><span class="nav-icon" data-icon="settings" data-icon-size="22" data-icon-color="currentColor"></span>Settings</a>
        </div>
    </nav>
    <script>if (typeof GleeIcons !== 'undefined') GleeIcons.init();</script>
</body>
</html>
