<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German B1 (DTZ) - GleeGrow</title>
    <link rel="icon" type="image/png" href="gleegrow.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="feedback.css">
    <script src="feedback.js"></script>
    <script src="sound-manager.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>

    <!-- Firebase Auth -->
    <script src="firebase-auth.js"></script>
    <script src="age-filter.js"></script>
    <script src="child-session-manager.js"></script>
    <script src="profile-selector.js"></script>
    <style>
        /* Hide content initially to prevent flash of inappropriate content */
        .container {
            opacity: 0;
            transition: opacity 0.1s ease-in;
        }

        /* Show content after auth and profile check completes */
        .container.content-loaded {
            opacity: 1;
        }
    </style>
</head>
<body>
    <script>
        // Wait for Firebase auth to initialize
        firebase.auth().onAuthStateChanged(function(user) {
            if (!user) {
                window.location.href = 'login';
                return;
            }

            // Show content now that auth check is complete
            setTimeout(function() {
                document.querySelector('.container').classList.add('content-loaded');
            }, 100);
        });
    </script>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div id="app-branding"></div>
                <div>
                    <h1>🇩🇪 Deutsch B1 - DTZ Vorbereitung</h1>
                    <p class="subtitle">German B1 Level - DTZ Test Preparation</p>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div id="profile-selector-container"></div>
            </div>
        </header>

        <div class="level-selection" id="main-selection">
            <h2>Practice Modules</h2>
            <div class="level-grid">
                <button onclick="loadA1Stories()" class="level-btn" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                    <span class="level-name">📖 A1 Geschichten (A1 Stories)</span>
                    <span class="level-desc">Beginner Stories with Comprehension Questions</span>
                </button>
                <button onclick="loadWorksheet('articles')" class="level-btn">
                    <span class="level-name">Artikel (Articles)</span>
                    <span class="level-desc">der, die, das - Definite & Indefinite Articles</span>
                </button>
                <button onclick="loadWorksheet('cases')" class="level-btn">
                    <span class="level-name">Fälle (Cases)</span>
                    <span class="level-desc">Nominativ, Akkusativ, Dativ</span>
                </button>
                <button onclick="loadWorksheet('verbs')" class="level-btn">
                    <span class="level-name">Verben (Verbs)</span>
                    <span class="level-desc">Present, Past, Perfect Tense</span>
                </button>
                <button onclick="loadWorksheet('prepositions')" class="level-btn">
                    <span class="level-name">Präpositionen (Prepositions)</span>
                    <span class="level-desc">mit, zu, nach, für, etc.</span>
                </button>
                <button onclick="loadWorksheet('adjectives')" class="level-btn">
                    <span class="level-name">Adjektivendungen (Adjective Endings)</span>
                    <span class="level-desc">Adjective Declension Practice</span>
                </button>
                <button onclick="loadWorksheet('reading')" class="level-btn">
                    <span class="level-name">Leseverstehen (Reading)</span>
                    <span class="level-desc">Reading Comprehension - DTZ Style</span>
                </button>
                <button onclick="loadWorksheet('vocabulary')" class="level-btn">
                    <span class="level-name">Wortschatz (Vocabulary)</span>
                    <span class="level-desc">B1 Level Essential Words</span>
                </button>
                <button onclick="loadWorksheet('writing')" class="level-btn">
                    <span class="level-name">Schreiben (Writing)</span>
                    <span class="level-desc">Formal & Informal Letters/Emails</span>
                </button>
                <button onclick="loadWorksheet('modalverbs')" class="level-btn">
                    <span class="level-name">Modalverben (Modal Verbs)</span>
                    <span class="level-desc">können, müssen, dürfen, sollen, wollen, mögen</span>
                </button>
                <button onclick="loadWorksheet('separable')" class="level-btn">
                    <span class="level-name">Trennbare Verben (Separable Verbs)</span>
                    <span class="level-desc">aufstehen, mitkommen, anrufen, etc.</span>
                </button>
                <button onclick="loadWorksheet('reflexive')" class="level-btn">
                    <span class="level-name">Reflexivverben (Reflexive Verbs)</span>
                    <span class="level-desc">sich freuen, sich interessieren, etc.</span>
                </button>
                <button onclick="loadWorksheet('conjunctions')" class="level-btn">
                    <span class="level-name">Konjunktionen (Conjunctions)</span>
                    <span class="level-desc">weil, dass, wenn, obwohl, etc.</span>
                </button>
                <button onclick="loadWorksheet('wordorder')" class="level-btn">
                    <span class="level-name">Wortstellung (Word Order)</span>
                    <span class="level-desc">Main & Subordinate Clauses</span>
                </button>
                <button onclick="loadWorksheet('comparative')" class="level-btn">
                    <span class="level-name">Komparativ & Superlativ</span>
                    <span class="level-desc">Comparative & Superlative</span>
                </button>
                <button onclick="loadWorksheet('pronouns')" class="level-btn">
                    <span class="level-name">Pronomen (Pronouns)</span>
                    <span class="level-desc">Personal, Possessive, Reflexive</span>
                </button>
                <button onclick="loadWorksheet('relativeclauses')" class="level-btn">
                    <span class="level-name">Relativsätze (Relative Clauses)</span>
                    <span class="level-desc">der, die, das (relative pronouns)</span>
                </button>
                <button onclick="loadWorksheet('konjunktiv')" class="level-btn">
                    <span class="level-name">Konjunktiv II</span>
                    <span class="level-desc">würde, könnte, wäre, hätte</span>
                </button>
                <button onclick="loadWorksheet('passive')" class="level-btn">
                    <span class="level-name">Passiv (Passive Voice)</span>
                    <span class="level-desc">werden + Partizip II</span>
                </button>
            </div>
            <div class="navigation" style="margin-bottom: 20px;">
                <button onclick="window.location.href='index'">← Back to Subjects</button>
            </div>
        </div>

        <!-- A1 Stories Section -->
        <div id="a1-stories-section" style="display: none;">
            <div class="navigation" style="margin-bottom: 20px;">
                <button onclick="backToMainSelection()">← Back to Practice Modules</button>
            </div>

            <div id="a1-difficulty-selection">
                <h2>A1 Stories - Select Difficulty</h2>
                <div class="level-grid">
                    <button onclick="loadA1StoryList('easy')" class="level-btn" style="background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);">
                        <span class="level-name">Einfach (Easy)</span>
                        <span class="level-desc">Very Simple Stories</span>
                    </button>
                    <button onclick="loadA1StoryList('medium')" class="level-btn" style="background: linear-gradient(135deg, #fddb92 0%, #d1fdff 100%);">
                        <span class="level-name">Mittel (Medium)</span>
                        <span class="level-desc">Simple Stories</span>
                    </button>
                    <button onclick="loadA1StoryList('hard')" class="level-btn" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);">
                        <span class="level-name">Schwer (Hard)</span>
                        <span class="level-desc">More Complex A1 Stories</span>
                    </button>
                </div>
            </div>

            <div id="a1-story-selection" style="display: none;">
                <div class="navigation" style="margin-bottom: 20px;">
                    <button onclick="window.location.href='index'">← Back to Home</button>
                </div>
                <h2 id="a1-story-list-title">Choose a Story</h2>
                <div id="a1-story-list" class="level-grid"></div>
            </div>

            <div id="a1-story-content"></div>
        </div>

        <footer>
            <p>Viel Erfolg! - Good luck with your German studies!</p>
        </footer>
    </div>

    <script src="german-b1-extended.js"></script>
    <script src="app-constants.js"></script>
    <script src="german-generator.js"></script>
    <script src="german-a1-stories.js"></script>
    <script src="branding.js"></script>
    <nav class="bottom-nav" aria-label="Main navigation">
        <div class="bottom-nav-inner">
            <a href="index" class="bottom-nav-item"><span class="nav-icon">🏠</span>Home</a>
            <a href="stories" class="bottom-nav-item"><span class="nav-icon">📖</span>Stories</a>
            <a href="rewards" class="bottom-nav-item"><span class="nav-icon">⭐</span>Rewards</a>
            <a href="settings" class="bottom-nav-item"><span class="nav-icon">⚙️</span>Settings</a>
        </div>
    </nav>
</body>
</html>
